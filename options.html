<!DOCTYPE html>
<html>
  <head>
    <style>
      body { width: 320px; padding: 24px; font-family: sans-serif; font-size: 14px; }
      h2 { margin: 0 0 20px; font-size: 16px; }
      label { display: block; margin-bottom: 6px; color: #555; }
      input[type="password"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; box-sizing: border-box; }
      button { margin-top: 12px; padding: 8px 16px; background: #4f8ef7; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
      button:hover { background: #3a7de0; }
      .confirm { color: green; margin-top: 8px; display: none; font-size: 12px; }
      .section { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #eee; }
      .radio-group { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
      .radio-group label { display: flex; align-items: center; gap: 8px; color: #333; cursor: pointer; margin: 0; }
      .radio-group span { font-size: 12px; color: #888; display: block; margin-left: 22px; }
    </style>
  </head>
  <body>
    <h2>Prompt Memory Settings</h2>

    <div class="section">
      <label>Context Scope</label>
      <div class="radio-group">
        <label>
          <input type="radio" name="scope" value="cross" />
          Cross-AI
        </label>
        <span>Context follows you between ChatGPT and Claude</span>
        <label>
          <input type="radio" name="scope" value="per" />
          Per AI
        </label>
        <span>ChatGPT and Claude stay separate</span>
      </div>
    </div>

    
    <script src="options.js"></script>
  </body>
</html>
