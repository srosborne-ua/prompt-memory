<!DOCTYPE html>
<html>
  <head>
    <style>
      body { width: 320px; padding: 16px; font-family: sans-serif; font-size: 13px; }
      h2 { margin: 0 0 12px; font-size: 15px; }
      .entry { padding: 8px; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 8px; }
      .entry p { margin: 0 0 4px; line-height: 1.4; }
      .meta { color: #888; font-size: 11px; }
      .delete { float: right; background: none; border: none; color: #aaa; cursor: pointer; font-size: 13px; }
      .delete:hover { color: #e00; }
      #empty { color: #999; }
    </style>
  </head>
  <body>
    <h2>Prompt Memory</h2>
    <div id="list"></div>
    <p id="empty" style="display:none">No saved prompts yet. Try chatting on Claude or ChatGPT.</p>
    <script src="popup.js"></script>
  </body>
</html>
